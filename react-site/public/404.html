<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>LEVEL UP</title>
    <!--
      SPA redirect for GitHub Pages (rafgraph/spa-github-pages).
      GitHub Pages has no server-side routing: a deep link like /linktree-levelup/eventi
      404s. This page encodes the path into a query string and bounces to index.html,
      where a matching script restores the real URL before React Router boots.
      pathSegmentsToKeep = 1 keeps the /linktree-levelup project base.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
